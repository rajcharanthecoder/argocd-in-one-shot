apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  context: |
    argocdUrl: "http://https://192.168.0.9:33894:8080"

  service.email: |
    username: $email-username
    password: $email-password
    host: smtp.gmail.com
    port: 465
    from: "ArgoCD Alerts <$email-username>"

  ########################################
  # 🚨 HEALTH DEGRADED TEMPLATE
  ########################################
  template.email-health-degraded: |
    email:
      subject: "[🚨 CRITICAL] {{.app.metadata.name}} is Degraded"
    message: |
      🔴 APPLICATION ALERT

      App Name      : {{.app.metadata.name}}
      Namespace     : {{.app.metadata.namespace}}
      Cluster       : {{.app.spec.destination.server}}

      Health Status : {{.app.status.health.status}}
      Message       : {{.app.status.health.message}}

      Sync Status   : {{.app.status.sync.status}}
      Revision      : {{.app.status.sync.revision}}

      Repo URL      : {{.app.spec.source.repoURL}}
      Path          : {{.app.spec.source.path}}

      Last Operation: {{ if .app.operationState }}{{ .app.operationState.phase }}{{ else }}N/A{{ end }}

      🔗 Open App:
      {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

      ⏰ Time: {{ now }}

  ########################################
  # ✅ SUCCESS TEMPLATE
  ########################################
  template.email-deployed: |
    email:
      subject: "[✅ SUCCESS] {{.app.metadata.name}} deployed successfully"
    message: |
      🟢 DEPLOYMENT SUCCESS

      App Name      : {{.app.metadata.name}}
      Namespace     : {{.app.metadata.namespace}}
      Cluster       : {{.app.spec.destination.server}}

      Health Status : {{.app.status.health.status}}
      Sync Status   : {{.app.status.sync.status}}

      Revision      : {{.app.status.sync.revision}}
      Repo URL      : {{.app.spec.source.repoURL}}

      Finished At   : {{ if .app.operationState }}{{ .app.operationState.finishedAt }}{{ end }}

      🔗 View App:
      {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

      🚀 Deployment completed successfully.

  ########################################
  # ❌ SYNC FAILED TEMPLATE
  ########################################
  template.email-sync-failed: |
    email:
      subject: "[❌ FAILED] {{.app.metadata.name}} sync failed"
    message: |
      🔥 DEPLOYMENT FAILURE

      App Name      : {{.app.metadata.name}}
      Namespace     : {{.app.metadata.namespace}}

      Sync Status   : {{.app.status.sync.status}}
      Health Status : {{.app.status.health.status}}

      Error Message :
      {{ if .app.operationState }}{{ .app.operationState.message }}{{ end }}

      Repo          : {{.app.spec.source.repoURL}}
      Revision      : {{.app.status.sync.revision}}

      🔗 Debug:
      {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

      ⚠️ Immediate attention required.

  ########################################
  # ⚠️ UNKNOWN / OUTOFSYNC TEMPLATE
  ########################################
  template.email-outofsync: |
    email:
      subject: "[⚠️ OUT OF SYNC] {{.app.metadata.name}} requires sync"
    message: |
      ⚠️ CONFIG DRIFT DETECTED

      App Name      : {{.app.metadata.name}}
      Namespace     : {{.app.metadata.namespace}}

      Sync Status   : {{.app.status.sync.status}}
      Health Status : {{.app.status.health.status}}

      Repo          : {{.app.spec.source.repoURL}}
      Target Rev    : {{.app.spec.source.targetRevision}}

      🔗 Fix:
      {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

      🛠 Manual or auto sync required.

  ########################################
  # 🔔 TRIGGERS
  ########################################
  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [email-health-degraded]

  trigger.on-deployed: |
    - when: app.status.operationState.phase == 'Succeeded' and app.status.health.status == 'Healthy'
      send: [email-deployed]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [email-sync-failed]

  trigger.on-outofsync: |
    - when: app.status.sync.status == 'OutOfSync'
      send: [email-outofsync]
